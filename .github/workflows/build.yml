# RETIRED 2026-07-15 — the model pipeline moved to Dave356w/Dave356w
# (which now includes the DK closing-odds join). This workflow only
# deploys the static redirect pages in public/; there are no scheduled
# runs anymore. The old pipeline is in this repo's git history.
name: deploy-redirect

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
